name: E2E Smoke Test

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @desktalk/core exec playwright install --with-deps chromium

      - name: Start DeskTalk server
        run: pnpm --filter @desktalk/core exec node dist/cli/index.js start --host 127.0.0.1 --port 3000 > /tmp/desktalk-e2e.log 2>&1 &

      - name: Wait for DeskTalk to be ready
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo 'DeskTalk did not become ready in time.'
          exit 1

      - name: Run Playwright smoke test
        run: pnpm --filter @desktalk/core e2e:test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/core/playwright-report
          if-no-files-found: ignore

      - name: Upload DeskTalk server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktalk-server-log
          path: /tmp/desktalk-e2e.log
          if-no-files-found: ignore
