name: Unit Tests

on:
  pull_request:
    branches:
      - master
      - main
      
jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm --filter @desktalk/sdk build && pnpm -r exec tsc -p tsconfig.build.json --noEmit

      - name: Run ESLint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm unit:test
